spring:
  application:
    name: batt
  # Import application-secret
  config:
    import: optional:application-secret.yml
  # JPA Config
  jpa:
    show-sql: false
    database: postgresql
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

log:
  config:
    path: ${LOG.PATH}
    filename:
      default: ${LOG.FILENAME.DEFAULT}
      error: ${LOG.FILENAME.ERROR}

# Logging config
logging:
  level:
    root: INFO
  config: classpath:logback-spring.xml
