# nginx.conf

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # 기본 설정
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120;
    keepalive_requests 1000; 
    
    # 클라이언트 타임아웃 설정
    client_header_timeout 60s;
    client_body_timeout 60s;      
    send_timeout 3600s;
    
    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        text/css
        text/javascript
        text/plain
        text/xml
        application/xml;

    # 티켓팅 사이트용 Rate Limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=80r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=sse:10m rate=100r/s;

    # HTTP to HTTPS 리다이렉트
    server {
        listen 80;
        server_name i13a506.p.ssafy.io;

        # Let's Encrypt 검증용
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 메인 서버
    server {
        listen 443 ssl http2;
        server_name i13a506.p.ssafy.io;
        root /usr/share/nginx/html;
        index index.html;

        # SSL 설정
        ssl_certificate /etc/letsencrypt/live/i13a506.p.ssafy.io-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/i13a506.p.ssafy.io-0001/privkey.pem;

        # SSL 보안 설정
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # 보안 헤더
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # SSE 전용 설정 (정확한 경로: /api/v1/transfers/subscribe)
        location ^~ /api/v1/transfers/subscribe {
            limit_req zone=sse burst=500 nodelay;
            
            proxy_pass http://spring_backend:8080/api/v1/transfers/subscribe;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            # SSE 핵심 설정
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            
            # SSE 장시간 연결 유지
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
            proxy_connect_timeout 30s;
            
            # CORS 헤더 (SSE용)
            add_header Access-Control-Allow-Origin "https://i13a506.p.ssafy.io" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Cache-Control" always;
            add_header Access-Control-Allow-Credentials true always;
            
            # OPTIONS preflight 처리
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://i13a506.p.ssafy.io" always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Cache-Control" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }



        # OAuth2 인증 경로
        location ^~ /oauth2/ {
            limit_req zone=auth burst=100 nodelay;
            
            proxy_pass http://spring_backend:8080/oauth2/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            # OAuth2 리다이렉트를 위한 설정
            proxy_redirect http:// https://;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # OAuth2 콜백 경로
        location ^~ /login/oauth2/code/ {
            limit_req zone=auth burst=100 nodelay;
            
            proxy_pass http://spring_backend:8080/login/oauth2/code/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            proxy_redirect http:// https://;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Backend API
        location ^~ /api/ {
            limit_req zone=api burst=500 nodelay;
            
            # /api 경로 그대로 백엔드로 전달
            proxy_pass http://spring_backend:8080/api/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Actuator 엔드포인트 (직접 매핑)
        location ^~ /actuator/ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://spring_backend:8080/actuator/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # 정적 자원 캐시
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # React Router 지원
        location / {
            limit_req zone=general burst=300 nodelay;
            try_files $uri $uri/ /index.html;
        }
    }
}